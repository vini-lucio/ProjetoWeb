{% extends "admin/index.html" %}

{% comment %} {% block nav-sidebar %}
    {% include "admin/nav_sidebar.html" %}
{% endblock %} {% endcomment %}

{% block content %}
    <div id="content-main">
        {% load i18n %}
        <nav style="margin: 0 auto;" class="module" id="nav-sidebar" aria-label="{% translate 'Sidebar' %}">
            <input type="search" id="nav-filter"
                    placeholder="{% translate 'Start typing to filter…' %}"
                    aria-label="{% translate 'Filter navigation items' %}">
            {% include 'admin/app_list.html' with app_list=app_list show_changelinks=True %}
        </nav>
    </div>
{% endblock content %}
